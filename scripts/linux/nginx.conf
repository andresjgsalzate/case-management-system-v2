# ============================================================
#  Nginx — CMS Production Configuration
#  Place at /etc/nginx/sites-available/cms
#  Symlink: ln -s /etc/nginx/sites-available/cms /etc/nginx/sites-enabled/
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream definitions
upstream cms_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream cms_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── Main HTTPS server ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_PLACEHOLDER;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Connection limit per IP
    limit_conn addr 20;

    client_max_body_size 25m;

    # ── API proxy ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://cms_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # CORS — handled by FastAPI, strip duplicates here
        proxy_hide_header Access-Control-Allow-Origin;
    }

    # ── Auth endpoints (stricter rate limiting) ────────────
    location ~ ^/api/v1/auth/(login|refresh) {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass         http://cms_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── SSE (Server-Sent Events) ───────────────────────────
    location /api/v1/notifications/stream {
        proxy_pass         http://cms_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE requires these to be disabled
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    3600s;

        # Keep connection alive for long-lived SSE
        keepalive_timeout 3600s;
    }

    # ── WebSocket (if needed in future) ───────────────────
    location /ws/ {
        proxy_pass         http://cms_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Static assets (Next.js) ───────────────────────────
    location /_next/static/ {
        proxy_pass http://cms_frontend;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Next.js frontend ───────────────────────────────────
    location / {
        proxy_pass         http://cms_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
    }

    # Gzip compression
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary       on;

    # Access & error logs
    access_log /var/log/nginx/cms-access.log;
    error_log  /var/log/nginx/cms-error.log warn;
}
